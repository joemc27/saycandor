let deck=[],used=0,skips=0,activeCat="all",activeTier="all";
function shuffle(a){let b=[...a];for(let i=b.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]]}return b;}
function buildDeck(){
  let f=ALL;
  if(activeCat!=="all")f=f.filter(q=>q.c===activeCat);
  if(activeTier!=="all")f=f.filter(q=>q.t===parseInt(activeTier));
  deck=shuffle(f);used=0;render();
}
function updateStats(){
  document.getElementById("s-done").textContent=used;
  document.getElementById("s-left").textContent=Math.max(0,deck.length-used);
  document.getElementById("s-skips").textContent=skips;
  const pct=deck.length>0?Math.round((used/deck.length)*100):0;
  document.getElementById("prog").style.width=pct+"%";
}
const tL={1:"Warm Up",2:"Getting Real",3:"No Filter"};
const tC={1:"b-t1",2:"b-t2",3:"b-t3"};
const cL={funny:"Funny",deep:"Deep",relationship:"Relationship",wild:"Wild",spicy:"Spicy"};
const cC={funny:"b-funny",deep:"b-deep",relationship:"b-relationship",wild:"b-wild",spicy:"b-spicy"};
function render(){
  const area=document.getElementById("card-inner");
  const btns=document.getElementById("btn-area");
  updateStats();
  if(used>=deck.length){
    area.innerHTML=`<div class="done-screen"><div class="done-icon">🌊</div><div class="done-h">Deck cleared.</div><div class="done-p">You two just talked more honestly than most couples do in a year.<br><br>Shuffle and go again — or pick a category and go deeper.</div><button class="btn-restart" onclick="buildDeck()">Shuffle & Restart</button></div>`;
    btns.style.display="none";return;
  }
  btns.style.display="flex";
  const q=deck[used];
  area.innerHTML=`<div class="qcard"><div class="qcard-top"><span class="badge ${tC[q.t]}">${tL[q.t]}</span><span class="badge ${cC[q.c]}">${cL[q.c]}</span><span class="qnum">${used+1} / ${deck.length}</span></div><div class="question">${q.q}</div><div class="drink-box"><div class="drink-label">Drink rule</div><div class="drink-text">🥃 ${q.d}</div><div class="skip-text">${q.sk}</div></div></div>`;
}
document.getElementById("btn-next").addEventListener("click",()=>{used++;render();});
document.getElementById("btn-skip").addEventListener("click",()=>{skips++;used++;render();});
document.getElementById("btn-shuffle").addEventListener("click",()=>buildDeck());
document.querySelectorAll(".chip").forEach(el=>{
  el.addEventListener("click",()=>{
    const f=el.dataset.f;
    document.querySelectorAll(`.chip[data-f="${f}"]`).forEach(x=>x.classList.remove("on"));
    el.classList.add("on");
    if(f==="cat")activeCat=el.dataset.v;
    else activeTier=el.dataset.v;
    buildDeck();
  });
});
buildDeck();
</script>
